<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Reading Progress — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--paper:#f7f5f0;--card:#fff;--ink:#1d1c18;--muted:#6b675c;--faint:#a8a496;--hair:#e7e2d6;--accent:#2f3a8c;--serif:'Newsreader',Georgia,serif;--mono:'Space Mono',monospace;}
  *{box-sizing:border-box;} body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--serif);padding:40px 24px;}
  .wrap{max-width:880px;margin:0 auto;}
  h1{font-weight:400;font-size:2rem;margin:0 0 4px;}
  .sub{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);margin:0 0 28px;}
  .keyrow{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap;}
  input{font-family:var(--mono);font-size:13px;padding:10px 14px;border:1px solid var(--hair);border-radius:999px;background:var(--card);min-width:260px;}
  button{font-family:var(--mono);font-size:13px;padding:10px 18px;border-radius:999px;background:var(--ink);color:var(--paper);border:1px solid var(--ink);cursor:pointer;}
  button:hover{background:var(--accent);border-color:var(--accent);}
  .stats{display:flex;gap:28px;flex-wrap:wrap;margin:0 0 24px;}
  .stat .n{font-size:1.8rem;} .stat .l{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);}
  table{width:100%;border-collapse:collapse;font-size:14px;}
  th{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);text-align:left;padding:10px 8px;border-bottom:1px solid var(--hair);}
  td{padding:11px 8px;border-bottom:1px solid var(--hair);}
  td.email{font-family:var(--mono);font-size:12px;}
  td.num{font-variant-numeric:tabular-nums;}
  .bar{display:inline-block;height:6px;background:var(--accent);border-radius:999px;vertical-align:middle;}
  .unsub{color:var(--faint);text-decoration:line-through;}
  .msg{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:16px;}
</style>
</head>
<body>
  <div class="wrap">
    <h1>Reading Progress</h1>
    <p class="sub">Admin · private</p>

    <div class="keyrow">
      <input id="key" type="password" placeholder="admin key" autocomplete="off">
      <button id="load">Load</button>
    </div>

    <div id="out"></div>
    <p class="msg" id="msg"></p>
  </div>

<script>
(function(){
  var FN = "https://iaspidhmxppsuwydmvym.supabase.co/functions/v1/admin-summary";
  var keyEl = document.getElementById("key");
  var out = document.getElementById("out");
  var msg = document.getElementById("msg");
  keyEl.value = localStorage.getItem("bible_admin_key") || "";

  function fmtDate(s){ if(!s) return "—"; try { return new Date(s).toLocaleDateString("en-US",{month:"short",day:"numeric"}); } catch(e){ return "—"; } }

  async function load(){
    var key = keyEl.value.trim();
    if(!key){ msg.textContent="Enter the admin key."; return; }
    localStorage.setItem("bible_admin_key", key);
    msg.textContent = "Loading…"; out.innerHTML="";
    try {
      var r = await fetch(FN + "?key=" + encodeURIComponent(key));
      if(r.status === 401){ msg.textContent="Wrong key."; return; }
      if(!r.ok){ msg.textContent="Error " + r.status; return; }
      var d = await r.json();
      render(d); msg.textContent = "Updated " + new Date(d.generated_at).toLocaleString();
    } catch(e){ msg.textContent = "Failed to load: " + e.message; }
  }

  function render(d){
    var maxDay = 365;
    var stats = '<div class="stats">' +
      '<div class="stat"><div class="n">'+d.total_subscribers+'</div><div class="l">Subscribers</div></div>' +
      '<div class="stat"><div class="n">'+d.active_subscribers+'</div><div class="l">Active</div></div>' +
      '<div class="stat"><div class="n">'+d.anonymous_readers+'</div><div class="l">Anon web readers</div></div>' +
      '</div>';
    var rows = d.subscribers.map(function(s){
      var pct = Math.round((s.furthest_day/maxDay)*100);
      return '<tr>' +
        '<td class="email'+(s.unsubscribed?' unsub':'')+'">'+s.email+'</td>' +
        '<td class="num">'+s.days_read+'</td>' +
        '<td class="num">'+(s.furthest_day||0)+' <span class="bar" style="width:'+Math.max(pct,1)+'px"></span></td>' +
        '<td>'+fmtDate(s.last_read_at)+'</td>' +
        '<td>'+(s.unsubscribed?'unsubscribed':'active')+'</td>' +
      '</tr>';
    }).join("");
    out.innerHTML = stats +
      '<table><thead><tr><th>Email</th><th>Days read</th><th>Furthest day</th><th>Last read</th><th>Status</th></tr></thead><tbody>' +
      (rows || '<tr><td colspan="5">No subscribers yet.</td></tr>') + '</tbody></table>';
  }

  document.getElementById("load").addEventListener("click", load);
  keyEl.addEventListener("keydown", function(e){ if(e.key==="Enter") load(); });
  if(keyEl.value) load();
})();
</script>
</body>
</html>
