name: Bible Reading Plan

on:
  schedule:
    - cron: '0 12 * * *'   # 8:00 AM ET (EDT) — generate + send
    - cron: '0 0 * * *'    # 8:00 PM ET (EDT) — evening reminder
    - cron: '0 9 * * *'    # 5:00 AM ET (EDT) — morning reminder
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'generate'
        type: choice
        options:
          - generate
          - remind-evening
          - remind-morning
          - seed

permissions:
  contents: write

jobs:
  bible-reading:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "12" ]; then
              echo "mode=generate" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "00" ]; then
              echo "mode=remind-evening" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "09" ]; then
              echo "mode=remind-morning" >> $GITHUB_OUTPUT
            else
              echo "mode=generate" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Seed reading plan to Supabase
        if: steps.mode.outputs.mode == 'seed'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/seed_reading_plan.py

      - name: Run Bible reading script
        if: steps.mode.outputs.mode != 'seed'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BIBLE_API_KEY: ${{ secrets.BIBLE_API_KEY }}
          ESV_API_KEY: ${{ secrets.ESV_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          HMAC_SECRET: ${{ secrets.HMAC_SECRET }}
        run: python scripts/generate_bible.py --mode ${{ steps.mode.outputs.mode }}

      - name: Commit and push if changed
        if: steps.mode.outputs.mode == 'generate'
        run: |
          git config user.name "Bible Bot"
          git config user.email "actions@github.com"
          git add bible/ scripts/bible_context.json
          git diff --cached --quiet || git commit -m "Bible reading for $(date -u +%Y-%m-%d)"
          git push
