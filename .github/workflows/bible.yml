name: Bible Reading Plan

on:
  schedule:
    - cron: '0 12 * * *'   # 8:00 AM ET (EDT) — one daily reading email
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily           # generate the day(s) due, then email subscribers
          - send            # email subscribers the day they're on (no generation)
          - backfill        # generate analysis for every day missing it (one-time)
          - day             # (re)generate a single day  (set "day")
          - send-test       # email ONE day to a test address (set "day" + optional "to")
          - remind-evening
          - remind-morning
      day:
        description: 'Day number (for day / send-test)'
        required: false
        type: string
      to:
        description: 'Recipient (for send-test; defaults to TEST_EMAIL secret)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  bible-reading:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
          else
            echo "mode=send" >> $GITHUB_OUTPUT
          fi

      - name: Run generator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          HMAC_SECRET: ${{ secrets.HMAC_SECRET }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
        run: |
          ARGS="--mode ${{ steps.mode.outputs.mode }}"
          if [ -n "${{ inputs.day }}" ]; then ARGS="$ARGS --day ${{ inputs.day }}"; fi
          if [ -n "${{ inputs.to }}" ]; then ARGS="$ARGS --to ${{ inputs.to }}"; fi
          echo "Running: python scripts/generate_bible.py $ARGS"
          python scripts/generate_bible.py $ARGS

      - name: Commit generated pages
        if: ${{ always() && (steps.mode.outputs.mode == 'daily' || steps.mode.outputs.mode == 'backfill' || steps.mode.outputs.mode == 'day') }}
        run: |
          git config user.name "Bible Bot"
          git config user.email "actions@github.com"
          git add bible/posts
          git diff --cached --quiet || git commit -m "Bible analysis (${{ steps.mode.outputs.mode }}) $(date -u +%Y-%m-%d)"
          git push
